<nav class="navbar bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand text-white m-3" routerLink="/dashboard"><img src="/favicon.png" alt="Logo"
                style="width: 48px;"></a>
        <ul class="navbar-nav d-flex flex-row mb-lg-0 gap-4 ms-3 px-2 py-1 justify-content-around flex-grow-1">
            @for (city of weather.navCities(); track city.city) {
            <li (click)="weather.searchCity(city.city)"
                class="nav-item d-flex flex-row mb-lg-0 gap-4 px-2 border border-light rounded bg-primary-subtle"
                style="cursor: pointer;">
                <a class="nav-link text-white">{{ city.city }}</a>
                <a class="nav-link text-white">{{ city.temp }}°C</a>
            </li>
            }
        </ul>
        <div style="position: relative;" class="w-25">
            <input type="text" [(ngModel)]="searchQuery" (input)="onInput()" (keydown)="onEnter($event)"
                placeholder="Search location..." class="form-control">
            @if (weather.suggestions().length > 0) {
            <ul class="suggestions-list">
                @for (city of weather.suggestions(); track city) {
                <li (click)="selectSuggestion(city)">{{ city }}</li>
                }
            </ul>
            }
        </div>
        <button class="ms-3 btn btn-outline-light" (click)="search()">Search</button>
        <a routerLink="/settings" class="nav-link text-white ms-5 me-3"><i class="fas fa-cog"
                style="font-size: 1.5rem ;"></i></a>
    </div>
</nav>
